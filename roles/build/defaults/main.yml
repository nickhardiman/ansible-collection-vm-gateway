---
# defaults for role
# definitions for libvirt network, VM and OS
# are located in a set_facts: task in kickstart/tasks/main.yml 
# nickhardiman.libvirt.libvirt_machine_kickstart 
# and in the defaults file of that role.

# public network
public_net_short_name: public
public_libvirt_name: "net{{ public_net_short_name }}"
public_nmcli_name: "bridge-{{ public_net_short_name }}"
public_bridge_name: "br{{ public_net_short_name }}"
public_mac_prefix: "52:54:00:00"

# home network
home_network: "192.168.1.0/24"
home_domain: home

# lab network
lab_net_short_name: lab
lab_net_prefix: "192.168.134"
lab_mac_prefix: "52:54:00:02"
#
lab_libvirt_name:   "net{{ lab_net_short_name }}"
lab_nmcli_name: "bridge-{{ lab_net_short_name }}"
lab_bridge_name:     "br{{ lab_net_short_name }}"
lab_bridge_mac:        "{{ lab_mac_prefix }}:00:01"
lab_bridge_ip_cidr:    "{{ lab_net_prefix }}.1/24"
lab_domain: silvan.uk

#---------
vm_gateway_file_config:
  # network
  lab_net_prefix: "192.168.134"
  nics:
    -
      name: enp1s0
      mac: "{{ public_mac_prefix }}:00:03"
      net: "{{ public_libvirt_name }}"
      # IP comes from the public network's DHCP service
      # eg. 192.168.1.234
    -
      name: enp2s0
      mac: "{{ lab_mac_prefix }}:00:03"
      net: "{{ lab_libvirt_name }}"
      # IP is static
      ip: "{{ lab_net_prefix }}.3"
  net_services:
    - dns
    - http
    - https
    - ssh
  fqdn: gateway.silvan.uk
  # apps
  rpms:
    - cockpit
    - httpd
    - squid
    - bind
  # accounts
  # names and passwords are from vault
  user_root_password_encrypted:    "{{ lookup('ansible.builtin.pipe', '/usr/bin/openssl passwd  -6 --salt=G3GIlnUH.JqcrAQl ' + user_root_password  | quote ) }}"
  user_admin_name: "{{ user_admin_name }}"
  user_admin_password_encrypted:   "{{ lookup('ansible.builtin.pipe', '/usr/bin/openssl passwd  -6 --salt=G3GIlnUH.JqcrAQl ' + user_admin_password  | quote ) }}"
  user_admin_public_key: "ssh-ed25519 1234567890ABCDEFT1234567890ABCDEF1234567890ABCDEF1234567890ABCDEF012 vboxuser@rhelvm"
  user_ansible_name: "{{ user_ansible_name }}"
  user_ansible_password_encrypted: "{{ lookup('ansible.builtin.pipe', '/usr/bin/openssl passwd  -6 --salt=G3GIlnUH.JqcrAQl ' + user_ansible_password  | quote ) }}"
  user_ansible_public_key: "ssh-ed25519 1234567890ABCDEFT1234567890ABCDEF1234567890ABCDEF1234567890ABCDEF012 vboxuser@rhelvm"
  # storage
  # default 30GB disk
  # size in GiB
  disk_size: 30
  # Add up the sizes below and make sure they fit in the disk_size.
  # partitions
  # 1 for /boot/efi                600M
  # 2 for /boot                    1024M
  # 3 LVM Physical Volume          28G * 1024 = 28672M
  pv_size: 28672
  # LVM logical volume for /root   13G * 1024 = 13312M
  lv_root: 13312
  # LVM logical volume for /var   13G * 1024 = 13312M
  lv_var: 13312
  # kickstart
  kickstart_template: "gateway.ks.j2"
#---------

#---------
vm_gateway_install_config: 
  fqdn: gateway.silvan.uk
  cpus: 2
  ram: 4096                           # size in MiB (4G * 1024 = 4096M)
  disk_size: 30                       # size in GiB
  nics:
    -
      name: enp1s0
      mac: "{{ public_mac_prefix }}:00:03"
      net: "{{ public_libvirt_name }}"
      # IP comes from the public network's DHCP service
      # eg. 192.168.1.234
    -
      name: enp2s0
      mac: "{{ lab_mac_prefix }}:00:03"
      net: "{{ lab_libvirt_name }}"
      # IP is static
      ip: "{{ lab_net_prefix }}.3"
  install_iso: /var/lib/libvirt/images/rhel-10.1-x86_64-dvd.iso
  # Use this command to get the list of accepted OS variants.
  #  virt-install --osinfo list
  os_variant: rhel10.1
  # kickstart
  # playbook copies kvm-guest.ks to /var/tmp/
  # !!! replace /var/tmp with a temporary ansible working directory
  kickstart_path: "/var/tmp"
  kickstart_template: "kvm-guest-nic-static.ks.j2"
  kickstart_file: "{{ fqdn }}.ks"
#---------
