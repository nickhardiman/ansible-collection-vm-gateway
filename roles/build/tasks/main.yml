---
# The internal gateway interface can't be routed to.
# We have to wait for the machine to boot up, 
# but we can't wait for it to start responding to pings.
# We can't ask libvirt because the VM is running even though the OS is not ready. 
# Instead, wait 20 seconds for boot.

- name: "Create kickstart config on {{ inventory_hostname }}"
  ansible.builtin.include_role:
    name: nickhardiman.libvirt.kickstart_file
  vars:
    kickstart_file_config: "{{ build_file_config }}"

- name: "Kickstart VM on hypervisor {{ inventory_hostname }}"
  ansible.builtin.include_role:
    name: nickhardiman.libvirt.kickstart_install
  vars:
    kickstart_install_config: "{{ build_install_config }}"

- name: Run machine (it stops after install)
  ansible.builtin.include_role:
    name: nickhardiman.libvirt.start_domain
  vars:
    start_domain_name: "{{ build_fqdn }}"
    wait_for_ping: false

- name: Pause for 20 seconds to allow OS boot to start SSH service
  ansible.builtin.pause:
    seconds: 20

