---

- name: "Create kickstart config on {{ inventory_hostname }}"
  ansible.builtin.include_role:
    name: nickhardiman.libvirt.kickstart_file
  vars:
    kickstart_file_config: "{{ vm_gateway_file_config }}"

- name: "Kickstart VM on hypervisor {{ inventory_hostname }}"
  ansible.builtin.include_role:
    name: nickhardiman.libvirt.kickstart_install
  vars:
    kickstart_install_config: "{{ vm_gateway_install_config }}"

- name: Run machine (it stops after install)
  ansible.builtin.include_role:
    name: nickhardiman.libvirt.machine_start
  vars:
    wait_for_ping: false

- name: "Add public IP to /etc/hosts on control node"
  ansible.builtin.include_role:
    name: nickhardiman.vm_gateway.etc_hosts_update

- name: "Add roles to {{ fqdn }}"
  ansible.builtin.include_role:
    name: nickhardiman.vm_gateway.roles_add
